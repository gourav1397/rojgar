services:
  postgres:
    image: postgres:16-alpine
    container_name: rogjar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rogjar
      POSTGRES_PASSWORD: rogjar
      POSTGRES_DB: rogjar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rogjar -d rogjar"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres-data:
