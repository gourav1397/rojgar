name: Rogjar CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rogjar
          POSTGRES_PASSWORD: rogjar
          POSTGRES_DB: rogjar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rogjar -d rogjar_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://rogjar:rogjar@localhost:5432/rogjar_test?schema=public
      JWT_ACCESS_SECRET: test-access-secret-change-me
      JWT_REFRESH_SECRET: test-refresh-secret-change-me
      WEB_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.7
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:deploy
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
